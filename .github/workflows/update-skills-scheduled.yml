name: Scheduled Skills Update

on:
  schedule:
    - cron: '0 */6 * * *' # Executa a cada 6 horas
  workflow_dispatch:      # Permite execução manual via botão no GitHub

permissions:
  contents: write

jobs:
  update-repo-state:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          pip install -r tools/requirements.txt
          npm ci

      - name: Sync Repository State
        run: npm run sync:repo-state
        env:
          SOURCE_DATE_EPOCH: ${{ github.event.repository.updated_at }}

      - name: Commit and Push Changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Adiciona apenas arquivos gerenciados para evitar drift indesejado
          git add skills_index.json CATALOG.md SKILLS.md data/*.json
          
          if git diff --cached --quiet; then
            echo "Nenhuma mudança detectada no catálogo."
          else
            git commit -m "chore: automated skills update [skip ci]"
            git push
          fi
